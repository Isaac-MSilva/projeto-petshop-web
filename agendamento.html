<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - PetShop Patinhas Felizes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🐾 Patinhas Felizes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link active" href="agendamento.html">Agendar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Agendamento de Serviços</h2>
        
        <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
            
            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">Dados do Cliente</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nomeCliente" class="form-label">Nome Completo:</label>
                            <input type="text" class="form-control" id="nomeCliente" placeholder="Digite seu nome" required>
                        </div>
                        <div class="col-md-6">
                            <label for="emailCliente" class="form-label">E-mail:</label>
                            <input type="email" class="form-control" id="emailCliente" placeholder="exemplo@email.com" required>
                        </div>
                        <div class="col-md-4">
                            <label for="cpfCliente" class="form-label">CPF:</label>
                            <input type="text" class="form-control" id="cpfCliente" placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-md-4">
                            <label for="telefoneCliente" class="form-label">Telefone:</label>
                            <input type="tel" class="form-control" id="telefoneCliente" placeholder="(00) 00000-0000">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Sexo:</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="sexo" id="sexoM" value="M">
                                <label class="form-check-label" for="sexoM">Masculino</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="sexo" id="sexoF" value="F">
                                <label class="form-check-label" for="sexoF">Feminino</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="enderecoCliente" class="form-label">Endereço Completo:</label>
                            <input type="text" class="form-control" id="enderecoCliente" placeholder="Rua, número, bairro...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">Dados do Pet</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nomePet" class="form-label">Nome do Pet:</label>
                            <input type="text" class="form-control" id="nomePet" required>
                        </div>
                        <div class="col-md-4">
                            <label for="racaPet" class="form-label">Raça:</label>
                            <input type="text" class="form-control" id="racaPet">
                        </div>
                        <div class="col-md-2">
                            <label for="idadePet" class="form-label">Idade (anos):</label>
                            <input type="number" class="form-control" id="idadePet" min="0" max="30">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">Serviço e Data</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="servicoSelect" class="form-label">Tipo de Serviço:</label>
                            <select class="form-select" id="servicoSelect" required>
                                <option value="" selected disabled>Escolha...</option>
                                <option value="banho">Banho Simples</option>
                                <option value="tosa">Banho e Tosa Completa</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Opções de Transporte:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="teleBusca">
                                <label class="form-check-label" for="teleBusca">
                                    Solicitar Tele-busca (buscamos e levamos seu pet)
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="dataAgendamento" class="form-label">Data:</label>
                            <input type="date" class="form-control" id="dataAgendamento" required>
                        </div>
                        <div class="col-md-6">
                            <label for="horaAgendamento" class="form-label">Hora:</label>
                            <input type="time" class="form-control" id="horaAgendamento" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 col-6 mx-auto mb-5">
                <button type="submit" class="btn btn-primary btn-lg">Confirmar Agendamento</button>
            </div>

        </form>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>© 2025 PetShop Patinhas Felizes.</p>
        <p id="relogio" class="small"></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
